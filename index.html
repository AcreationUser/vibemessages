<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Диалог</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1f;
    --sidebar: #141418;
    --panel: #1f1f26;
    --bubble-me: #4a3f6b;
    --bubble-them: #2a2a35;
    --accent: #c9a96e;
    --accent2: #8b7bb0;
    --text: #e8e4f0;
    --text-muted: #7a7690;
    --border: #2e2e3e;
    --input-bg: #26262f;
    --hover: #26262e;
    --danger: #c06060;
    --online: #6ec9a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 15px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--sidebar);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    z-index: 10;
  }

  #sidebar.collapsed {
    transform: translateX(-300px);
    width: 0;
    min-width: 0;
    overflow: hidden;
  }

  /* Toggle tab attached to sidebar edge */
  #sidebar-toggle {
    position: fixed;
    left: 300px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 56px;
    background: var(--sidebar);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 10px 10px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 30;
    transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
    color: var(--text-muted);
    font-size: 12px;
    user-select: none;
  }
  #sidebar-toggle:hover { color: var(--text); background: var(--panel); }
  #sidebar-toggle.collapsed { left: 0; }

  /* Overlay backdrop for mobile drawer */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9;
    backdrop-filter: blur(2px);
  }
  #sidebar-overlay.visible { display: block; }

  /* ── MOBILE: drawer mode ── */
  @media (max-width: 600px) {
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 25;
      /* start hidden off-screen */
      transform: translateX(-300px);
      width: 300px !important;
      min-width: 300px !important;
      overflow: visible;
    }
    #sidebar.open {
      transform: translateX(0);
    }
    #sidebar.collapsed {
      transform: translateX(-300px);
      width: 300px !important;
      min-width: 300px !important;
      overflow: hidden;
    }
    #sidebar-toggle {
      left: 0 !important;
    }
    #sidebar-toggle.open {
      left: 300px !important;
    }
    #chat-panel {
      width: 100%;
    }
  }

  #sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #my-avatar-wrap {
    position: relative;
    cursor: pointer;
  }

  #my-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent2);
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--accent);
    overflow: hidden;
  }

  .avatar-edit-btn {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: #1a1a1f;
    cursor: pointer;
  }

  #my-name-wrap {
    flex: 1;
  }

  #my-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    color: var(--text);
    transition: color 0.2s;
  }
  #my-name:hover { color: var(--accent); }

  #my-name-input {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--accent);
    color: var(--text);
    outline: none;
    width: 100%;
  }

  #my-status {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  #contacts-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  #contacts-list::-webkit-scrollbar { width: 4px; }
  #contacts-list::-webkit-scrollbar-track { background: transparent; }
  #contacts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .contact-item:hover { background: var(--hover); }
  .contact-item.active { background: #2a2535; }

  .contact-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: var(--accent2);
    flex-shrink: 0;
    overflow: hidden;
    font-family: 'Syne', sans-serif;
  }

  .contact-info { flex: 1; min-width: 0; }

  .contact-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-preview {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .contact-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: opacity 0.2s;
  }
  .contact-item:hover .contact-delete { opacity: 1; }

  #add-contact-btn {
    margin: 8px 16px 16px;
    padding: 11px;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  #add-contact-btn:hover { background: #7a6a9e; transform: translateY(-1px); }

  /* ── CHAT PANEL ── */
  #chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  #chat-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  #chat-panel > *:not(#chat-bg) { position: relative; z-index: 1; }

  #chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: rgba(20,20,24,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  #chat-contact-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    color: var(--accent2);
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }

  #chat-contact-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: color 0.2s;
  }
  #chat-contact-name:hover { color: var(--accent); }

  #chat-contact-status {
    font-size: 12px;
    color: var(--online);
    margin-top: 2px;
    cursor: pointer;
  }

  .header-spacer { flex: 1; }

  .header-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s;
    line-height: 1;
  }
  .header-btn:hover { background: var(--hover); color: var(--text); }

  #messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  #messages-area::-webkit-scrollbar { width: 4px; }
  #messages-area::-webkit-scrollbar-track { background: transparent; }
  #messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 4px;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 2px;
  }

  .msg-row.me { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--accent2);
    overflow: hidden;
    flex-shrink: 0;
    align-self: flex-end;
    font-family: 'Syne', sans-serif;
  }

  .msg-avatar.hidden { visibility: hidden; }

  .msg-bubble {
    max-width: 82%;
    padding: 9px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .msg-bubble:hover { opacity: 0.85; }
  .msg-bubble:hover .msg-actions { opacity: 1; }

  .msg-row.me .msg-bubble {
    background: var(--bubble-me);
    border-bottom-right-radius: 4px;
    color: #e8e4f0;
  }

  .msg-row.them .msg-bubble {
    background: var(--bubble-them);
    border-bottom-left-radius: 4px;
    color: #e8e4f0;
  }

  .msg-bubble img {
    max-width: 100%;
    border-radius: 10px;
    display: block;
    max-height: 300px;
    object-fit: cover;
  }

  .msg-meta {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .msg-row.me .msg-meta { justify-content: flex-end; }
  .msg-row.them .msg-meta { justify-content: flex-start; }

  .msg-actions {
    opacity: 0;
    display: flex;
    gap: 4px;
    transition: opacity 0.2s;
  }

  .msg-action-btn {
    background: var(--input-bg);
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .msg-action-btn:hover { color: var(--text); }
  .msg-action-btn.del:hover { color: var(--danger); }

  /* DATE DIVIDER */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin: 12px 0;
    position: relative;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1px;
    background: var(--border);
  }
  .date-divider::before { left: 0; }
  .date-divider::after { right: 0; }

  /* ── INPUT AREA ── */
  #input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, calc(12px + env(safe-area-inset-bottom, 0px)));
    background: rgba(20,20,24,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  #sender-toggle {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .sender-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    transition: all 0.2s;
  }

  .sender-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .sender-btn.active.me {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(139,123,176,0.1);
  }
  .sender-btn.active.me .dot { background: var(--accent2); }

  .sender-btn.active.them {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,169,110,0.1);
  }
  .sender-btn.active.them .dot { background: var(--accent); }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    max-height: 120px;
    min-height: 40px;
    line-height: 1.4;
  }

  #msg-input:focus { border-color: var(--accent2); }
  #msg-input::placeholder { color: var(--text-muted); }

  .icon-btn {
    width: 40px; height: 40px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

  #send-btn {
    width: 40px; height: 40px;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #7a6a9e; transform: scale(1.05); }

  /* ── EMPTY STATE ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-muted);
  }

  #empty-state .logo {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--border);
    letter-spacing: -2px;
  }

  #empty-state p {
    font-size: 14px;
    max-width: 240px;
    text-align: center;
    line-height: 1.6;
  }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 360px;
    max-width: 95vw;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .modal-field {
    margin-bottom: 16px;
  }

  .modal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent2); }

  .avatar-upload-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar-preview {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--input-bg);
    border: 2px solid var(--border);
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    color: var(--text-muted);
    overflow: hidden;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }

  .upload-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    text-align: center;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: var(--input-bg);
    color: var(--text-muted);
  }
  .btn-secondary:hover { color: var(--text); }

  .btn-primary {
    background: var(--accent2);
    color: white;
  }
  .btn-primary:hover { background: #7a6a9e; }

  .btn-danger {
    background: rgba(192,96,96,0.2);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(192,96,96,0.35); }

  /* Context menu */
  #ctx-menu {
    display: none;
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    z-index: 200;
    min-width: 140px;
    animation: fadeIn 0.12s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }

  .ctx-item {
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 7px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .ctx-item:hover { background: var(--hover); }
  .ctx-item.danger { color: var(--danger); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Image preview in bubble */
  .img-msg {
    padding: 4px;
  }

  /* Status dots */
  .status-indicator {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .status-online { background: var(--online); }
  .status-away { background: #c9a96e; }
  .status-offline { background: var(--text-muted); }

  .status-select {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .status-option {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    background: none;
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif;
  }
  .status-option.active { border-color: var(--accent2); color: var(--text); background: rgba(139,123,176,0.1); }
  .status-option:hover { border-color: var(--accent); }

  #time-display-toggle {
    display: flex;
    gap: 8px;
  }

  .time-opt {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    background: none;
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .time-opt.active { border-color: var(--accent2); color: var(--text); background: rgba(139,123,176,0.1); }

  /* bg upload */
  #bg-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-size: 13px;
  }
  #bg-upload-area:hover { border-color: var(--accent); color: var(--accent); }
  #bg-preview {
    margin-top: 10px;
    width: 100%;
    height: 80px;
    object-fit: cover;
    border-radius: 8px;
    display: none;
  }

  .msg-editing textarea {
    background: var(--input-bg);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    padding: 6px 10px;
    resize: none;
    outline: none;
    width: 100%;
    min-width: 200px;
  }

  /* @mention highlight */
  .mention {
    color: var(--accent);
    font-weight: 700;
    background: rgba(201,169,110,0.12);
    border-radius: 4px;
    padding: 0 2px;
  }
  .mention.me {
    color: var(--accent2);
    background: rgba(139,123,176,0.15);
  }

  /* Group chat — sender name above bubble */
  .msg-sender-name {
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    margin-bottom: 4px;
    margin-top: 10px; /* clear separation from previous message group */
    padding: 0 4px;
    /* align with bubble: avatar(28px) + gap(8px) = 36px */
    margin-left: 36px;
    opacity: 0.9;
  }

  /* Group sender toggle: scrollable row */
  #sender-toggle {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* Sidebar section label */
  .sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 10px 16px 4px;
  }

  /* Group avatar in sidebar */
  .contact-avatar.group-av {
    background: #2a2040;
    color: var(--accent);
    font-size: 14px;
  }

  /* Add buttons row */
  #add-btns {
    display: flex;
    gap: 8px;
    margin: 8px 16px 16px;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  #add-btns button {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  #add-contact-btn {
    margin: 0;
    background: var(--accent2);
    color: white;
  }
  #add-contact-btn:hover { background: #7a6a9e; }
  #add-group-btn {
    background: rgba(201,169,110,0.15);
    color: var(--accent);
    border: 1px solid rgba(201,169,110,0.3) !important;
  }
  #add-group-btn:hover { background: rgba(201,169,110,0.25); }

  /* Member checkboxes in group modal */
  .member-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
  }
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
    font-size: 13px;
  }
  .member-item:hover { background: var(--hover); }
  .member-item.selected { border-color: var(--accent2); background: rgba(139,123,176,0.1); }
  .member-item input[type=checkbox] { accent-color: var(--accent2); width:14px; height:14px; }

  /* Group header member count */
  #chat-members-row {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Contact color swatch */
  .color-picker-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .color-swatch {
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: white; transform: scale(1.15); }
  .color-custom-input {
    width: 36px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    padding: 0 2px;
  }
</style>
</head>
<body>

<script>
const isMobile = () => window.innerWidth <= 600;

function toggleSidebar() {
  if (isMobile()) {
    const sb = document.getElementById('sidebar');
    const btn = document.getElementById('sidebar-toggle');
    const overlay = document.getElementById('sidebar-overlay');
    const isOpen = sb.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.textContent = isOpen ? '‹' : '›';
    overlay.classList.toggle('visible', isOpen);
  } else {
    const sb = document.getElementById('sidebar');
    const btn = document.getElementById('sidebar-toggle');
    const collapsed = sb.classList.toggle('collapsed');
    btn.classList.toggle('collapsed', collapsed);
    btn.textContent = collapsed ? '›' : '‹';
  }
}

function closeSidebarMobile() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  const overlay = document.getElementById('sidebar-overlay');
  sb.classList.remove('open');
  btn.classList.remove('open');
  btn.textContent = '›';
  overlay.classList.remove('visible');
}

// On mobile: start with sidebar hidden; open on contact click closes it
window.addEventListener('DOMContentLoaded', () => {
  if (isMobile()) {
    // sidebar starts off-screen on mobile (already collapsed via CSS)
    document.getElementById('sidebar-toggle').textContent = '›';
  }
});

// ══════════════════════════════════
//   STATE
// ══════════════════════════════════
const CONTACT_COLORS = [
  '#c9a96e','#8b7bb0','#6ec9a0','#c06060',
  '#6090c0','#c06090','#e8a45a','#5ab8e8',
  '#a0c060','#e87070','#70b0e8','#c080a0',
];

let state = {
  myName: 'Мой аккаунт',
  myUsername: '',
  myStatus: 'онлайн',
  myAvatar: null,
  contacts: [],
  groups: [],
  activeContactId: null,
  activeGroupId: null,
  bgImage: null,
  bgOpacity: 12,
  timeMode: 'realtime',
  editingContactId: null,
  editingGroupId: null,
  tempContactAvatar: null,
  tempContactStatus: 'online',
  tempContactColor: '#8b7bb0',
  tempGroupAvatar: null,
  tempGroupMembers: [],
};

function saveState() {
  try {
    const s = JSON.stringify(state);
    localStorage.setItem('dlg_state', s);
  } catch(e) {}
}

function loadState() {
  try {
    const s = localStorage.getItem('dlg_state');
    if (s) {
      const loaded = JSON.parse(s);
      Object.assign(state, loaded);
    }
  } catch(e) {}
}

// ══════════════════════════════════
//   INIT
// ══════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadState();
  if (!state.groups) state.groups = [];
  applyMyProfile();
  renderContacts();
  if (state.activeGroupId) {
    const g = getGroup(state.activeGroupId);
    if (g) openGroupChat(state.activeGroupId);
  } else if (state.activeContactId) {
    const c = getContact(state.activeContactId);
    if (c) openChat(state.activeContactId);
  }
  applyBg();
});

function renderColorSwatches(containerId, selectedColor) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  CONTACT_COLORS.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (col === selectedColor ? ' active' : '');
    sw.style.background = col;
    sw.title = col;
    sw.onclick = () => {
      state.tempContactColor = col;
      renderColorSwatches(containerId, col);
    };
    container.appendChild(sw);
  });
}

// ══════════════════════════════════
//   CONTACTS
// ══════════════════════════════════
function getContact(id) {
  return state.contacts.find(c => c.id == id); // loose eq: string vs number safe
}
function getGroup(id) {
  return (state.groups || []).find(g => g.id == id);
}

function renderContacts() {
  const list = document.getElementById('contacts-list');
  list.innerHTML = '';

  // Contacts
  if (state.contacts.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'sidebar-section-label';
    lbl.textContent = 'Контакты';
    list.appendChild(lbl);
    state.contacts.forEach(c => appendContactItem(list, c));
  }

  // Groups
  const groups = state.groups || [];
  if (groups.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'sidebar-section-label';
    lbl.textContent = 'Группы';
    list.appendChild(lbl);
    groups.forEach(g => appendGroupItem(list, g));
  }
}

function appendContactItem(list, c) {
  const lastMsg = c.messages && c.messages.length > 0
    ? c.messages[c.messages.length - 1] : null;
  const preview = lastMsg ? (lastMsg.text || '📷 Изображение') : 'Нет сообщений';
  const isActive = c.id === state.activeContactId && !state.activeGroupId;

  const item = document.createElement('div');
  item.className = 'contact-item' + (isActive ? ' active' : '');
  item.dataset.id = c.id;
  item.onclick = () => openChat(c.id);

  const avatarEl = makeAvatarEl(c.avatar, c.name, 44, 'contact-avatar');
  const sub = c.username ? `<span style="font-size:11px;color:var(--text-muted)">${esc(c.username)}</span>` : esc(preview);

  item.innerHTML = `
    ${avatarEl}
    <div class="contact-info">
      <div class="contact-name">${esc(c.name)}</div>
      <div class="contact-preview">${sub}</div>
    </div>
    <button class="contact-delete" onclick="confirmDeleteContact(event,'${c.id}')">✕</button>
  `;
  list.appendChild(item);
}

function appendGroupItem(list, g) {
  const lastMsg = g.messages && g.messages.length > 0
    ? g.messages[g.messages.length - 1] : null;
  const preview = lastMsg ? (lastMsg.text || '📷 Изображение') : `${(g.members||[]).length + 1} участника`;
  const isActive = g.id === state.activeGroupId;

  const item = document.createElement('div');
  item.className = 'contact-item' + (isActive ? ' active' : '');
  item.onclick = () => openGroupChat(g.id);

  const avatarEl = makeAvatarEl(g.avatar, g.name, 44, 'contact-avatar group-av');

  item.innerHTML = `
    ${avatarEl}
    <div class="contact-info">
      <div class="contact-name">⊞ ${esc(g.name)}</div>
      <div class="contact-preview">${esc(preview)}</div>
    </div>
    <button class="contact-delete" onclick="confirmDeleteGroup(event,'${g.id}')">✕</button>
  `;
  list.appendChild(item);
}

function makeAvatarEl(avatarSrc, name, size, cls) {
  const initial = (name || '?')[0].toUpperCase();
  if (avatarSrc) {
    return `<img src="${avatarSrc}" class="${cls}" style="width:${size}px;height:${size}px" alt="${esc(name)}">`;
  }
  return `<div class="${cls}" style="width:${size}px;height:${size}px">${initial}</div>`;
}

function openChat(contactId) {
  state.activeContactId = contactId;
  state.activeGroupId = null;
  saveState();
  const c = getContact(contactId);
  if (!c) return;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';

  updateChatHeader(c);
  renderMessages();

  rebuildSenderToggle([
    { id: 'me', label: state.myName || 'Я' },
    { id: 'them', label: c.name },
  ]);
  currentSender = 'me';
  renderContacts();
  if (isMobile()) closeSidebarMobile();
}

function updateChatHeader(c, isGroup) {
  const avatarEl = document.getElementById('chat-contact-avatar');
  if (c.avatar) {
    avatarEl.innerHTML = `<img src="${c.avatar}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`;
  } else {
    avatarEl.textContent = isGroup ? '⊞' : (c.name || '?')[0].toUpperCase();
  }

  document.getElementById('chat-contact-name').textContent = c.name;

  const statusEl = document.getElementById('chat-contact-status');
  if (isGroup) {
    const count = (c.members || []).length + 1;
    statusEl.innerHTML = `<span style="color:var(--text-muted)">👥 ${count} участника</span>`;
    avatarEl.onclick = () => openEditGroupModal();
    document.getElementById('chat-contact-name').onclick = () => openEditGroupModal();
  } else {
    const statusMap = {
      online: ['status-online', 'онлайн'],
      away: ['status-away', 'не беспокоить'],
      offline: ['status-offline', 'не в сети'],
    };
    const [cls, text] = statusMap[c.status] || ['status-offline', c.status || ''];
    statusEl.innerHTML = `<span class="status-indicator ${cls}"></span>${text}`;
    avatarEl.onclick = () => openEditContactModal();
    document.getElementById('chat-contact-name').onclick = () => openEditContactModal();
  }
}

// ══════════════════════════════════
//   MESSAGES
// ══════════════════════════════════
let currentSender = 'me';
// senderOptions: [{id, label}]
let senderOptions = [];

function rebuildSenderToggle(options) {
  senderOptions = options;
  const row = document.getElementById('sender-toggle');
  row.innerHTML = `<span style="font-size:12px;color:var(--text-muted);margin-right:4px;">Пишет:</span>`;
  options.forEach((opt, i) => {
    const cls = (opt.id === 'me') ? 'me' : 'them';
    const btn = document.createElement('button');
    btn.className = `sender-btn ${cls}${i === 0 ? ' active' : ''}`;
    btn.id = `sender-opt-${opt.id}`;
    btn.innerHTML = `<span class="dot"></span><span>${esc(opt.label)}</span>`;
    btn.onclick = () => setSender(opt.id);
    row.appendChild(btn);
  });
  // time input
  const tw = document.createElement('span');
  tw.id = 'custom-time-wrap';
  tw.style.marginLeft = 'auto';
  tw.innerHTML = `<input type="text" id="custom-time-input" class="modal-input" placeholder="hh:mm (опц.)"
    style="width:90px;padding:5px 10px;font-size:12px;" title="Время сообщения">`;
  row.appendChild(tw);
  currentSender = options[0]?.id || 'me';
  document.querySelectorAll('.sender-btn').forEach(b => b.classList.remove('active'));
  const firstBtn = document.getElementById(`sender-opt-${currentSender}`);
  if (firstBtn) firstBtn.classList.add('active');
}

function setSender(who) {
  currentSender = who;
  document.querySelectorAll('.sender-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`sender-opt-${who}`);
  if (btn) btn.classList.add('active');
}

function getTime() {
  const inp = document.getElementById('custom-time-input');
  const val = inp ? inp.value.trim() : '';
  if (state.timeMode === 'hidden') return '';
  if (state.timeMode === 'manual' && val) return val;
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage(imgSrc) {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !imgSrc) return;

  const msg = {
    id: Date.now() + Math.random(),
    senderId: currentSender,
    text: text || '',
    image: imgSrc || null,
    time: getTime(),
  };

  if (state.activeGroupId) {
    const g = getGroup(state.activeGroupId);
    if (!g) return;
    if (!g.messages) g.messages = [];
    g.messages.push(msg);
  } else {
    const c = getContact(state.activeContactId);
    if (!c) return;
    // legacy compat: store senderId, also keep sender for old data
    msg.sender = currentSender;
    if (!c.messages) c.messages = [];
    c.messages.push(msg);
  }

  saveState();
  input.value = '';
  input.style.height = 'auto';
  const cti = document.getElementById('custom-time-input');
  if (cti) cti.value = '';
  renderMessages();
  renderContacts();
  scrollToBottom();
}

// Build all known @usernames → {username, isMe, name, colorIdx}
function buildMentionMap() {
  const map = {};
  if (state.myUsername) {
    const u = state.myUsername.startsWith('@') ? state.myUsername : '@' + state.myUsername;
    map[u.toLowerCase()] = { isMe: true, name: state.myName };
  }
  state.contacts.forEach(c => {
    if (c.username) {
      const u = c.username.startsWith('@') ? c.username : '@' + c.username;
      map[u.toLowerCase()] = { isMe: false, name: c.name, color: c.color || CONTACT_COLORS[0] };
    }
  });
  return map;
}

function highlightMentions(text) {
  const mentionMap = buildMentionMap();
  if (Object.keys(mentionMap).length === 0) return esc(text);
  const parts = text.split(/(@\S+)/g);
  return parts.map(part => {
    const info = mentionMap[part.toLowerCase()];
    if (info) {
      const col = info.isMe ? 'var(--accent2)' : (info.color || 'var(--accent)');
      const bg = info.isMe ? 'rgba(139,123,176,0.15)' : `${info.color}22`;
      return `<span class="mention" style="color:${col};background:${bg}">${esc(part)}</span>`;
    }
    return esc(part);
  }).join('');
}

// Color index for a senderId within a group
function senderColorIdx(senderId, group) {
  if (senderId === 'me') return -1;
  const idx = (group.members || []).indexOf(senderId);
  return idx % 6;
}

function getSenderInfo(senderId, group) {
  if (senderId === 'me') return { name: state.myName, avatar: state.myAvatar, initial: (state.myName||'Я')[0], color: null };
  const c = getContact(senderId);
  if (c) {
    return { name: c.name, avatar: c.avatar, initial: (c.name||'?')[0], color: c.color || CONTACT_COLORS[0] };
  }
  return { name: '?', avatar: null, initial: '?', color: CONTACT_COLORS[0] };
}

function renderMessages() {
  const area = document.getElementById('messages-area');
  area.innerHTML = '';

  const isGroup = !!state.activeGroupId;
  const chat = isGroup ? getGroup(state.activeGroupId) : getContact(state.activeContactId);

  if (!chat || !chat.messages || chat.messages.length === 0) {
    area.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">Нет сообщений</div>';
    return;
  }

  chat.messages.forEach((msg, i) => {
    // Legacy: old messages used msg.sender instead of msg.senderId
    const senderId = msg.senderId !== undefined ? msg.senderId : (msg.sender || 'me');
    const isMe = senderId === 'me';
    const senderClass = isMe ? 'me' : 'them';

    const nextMsg = chat.messages[i + 1];
    const nextSender = nextMsg ? (nextMsg.senderId !== undefined ? nextMsg.senderId : nextMsg.sender) : null;
    const showAvatar = !nextMsg || nextSender !== senderId;
    const showName = isGroup && !isMe && (i === 0 || (chat.messages[i-1].senderId ?? chat.messages[i-1].sender) !== senderId);

    const sInfo = getSenderInfo(senderId, isGroup ? chat : null);
    const nameColor = sInfo.color || 'var(--accent2)';

    const avatarEl = sInfo.avatar
      ? `<img src="${sInfo.avatar}" class="msg-avatar${showAvatar ? '' : ' hidden'}" alt="">`
      : `<div class="msg-avatar${showAvatar ? '' : ' hidden'}">${sInfo.initial.toUpperCase()}</div>`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (msg.image) bubble.classList.add('img-msg');

    if (msg.image) {
      bubble.innerHTML = `<img src="${msg.image}" alt="фото" onclick="viewImg(this.src)">`;
      if (msg.text) bubble.innerHTML += `<div style="margin-top:6px">${highlightMentions(msg.text)}</div>`;
    } else {
      bubble.innerHTML = highlightMentions(msg.text);
    }

    bubble.oncontextmenu = (e) => { e.preventDefault(); showCtxMenu(e, msg.id); };

    const row = document.createElement('div');
    row.className = `msg-row ${senderClass}`;
    row.dataset.msgId = msg.id;
    row.innerHTML = avatarEl;
    row.appendChild(bubble);

    const metaEl = document.createElement('div');
    metaEl.className = 'msg-meta';
    if (msg.time && state.timeMode !== 'hidden') {
      metaEl.innerHTML = `<span>${msg.time}</span>`;
      if (isMe) metaEl.innerHTML += ` <span style="color:var(--accent2)">✓✓</span>`;
    }

    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = isMe ? 'flex-end' : 'flex-start';

    if (showName) {
      const nameEl = document.createElement('div');
      nameEl.className = 'msg-sender-name';
      nameEl.style.color = nameColor;
      nameEl.textContent = sInfo.name;
      wrapper.appendChild(nameEl);
    }

    wrapper.appendChild(row);
    if (showAvatar || !nextMsg) wrapper.appendChild(metaEl);

    area.appendChild(wrapper);
  });

  scrollToBottom();
}

function scrollToBottom() {
  const area = document.getElementById('messages-area');
  setTimeout(() => area.scrollTop = area.scrollHeight, 30);
}

let ctxMsgId = null;

function showCtxMenu(e, msgId) {
  ctxMsgId = msgId;
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="editMsg(${msgId})">✎ Изменить</div>
    <div class="ctx-item danger" onclick="deleteMsg(${msgId})">✕ Удалить</div>
  `;
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';

  // Adjust if out of viewport
  setTimeout(() => {
    const r = menu.getBoundingClientRect();
    if (r.right > window.innerWidth) menu.style.left = (e.clientX - r.width) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top = (e.clientY - r.height) + 'px';
  }, 10);
}

document.addEventListener('click', () => {
  document.getElementById('ctx-menu').style.display = 'none';
});

function deleteMsg(msgId) {
  const chat = state.activeGroupId ? getGroup(state.activeGroupId) : getContact(state.activeContactId);
  if (!chat) return;
  chat.messages = chat.messages.filter(m => m.id !== msgId);
  saveState();
  renderMessages();
  renderContacts();
}

function editMsg(msgId) {
  const chat = state.activeGroupId ? getGroup(state.activeGroupId) : getContact(state.activeContactId);
  if (!chat) return;
  const msg = chat.messages.find(m => m.id === msgId);
  if (!msg || msg.image) return;

  const area = document.getElementById('messages-area');
  const row = area.querySelector(`[data-msg-id="${msgId}"] .msg-bubble`);
  if (!row) return;

  const oldText = msg.text;
  row.classList.add('msg-editing');
  row.innerHTML = `<textarea style="min-width:200px;width:100%">${esc(oldText)}</textarea>`;
  const ta = row.querySelector('textarea');
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;

  ta.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      msg.text = ta.value.trim() || oldText;
      saveState();
      renderMessages();
    }
    if (e.key === 'Escape') renderMessages();
  };
  ta.onblur = () => {
    msg.text = ta.value.trim() || oldText;
    saveState();
    renderMessages();
  };
}

function viewImg(src) {

  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out';

  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);

    b.classList.toggle('active', b.dataset.status === 'online');
  });

function openEditContactModal() {
  const c = getContact(state.activeContactId);
  if (!c) return;
  state.editingContactId = c.id;
  state.tempContactAvatar = c.avatar || null;
  state.tempContactStatus = c.status || 'online';

  document.getElementById('contact-modal-title').textContent = 'Редактировать контакт';
  document.getElementById('contact-modal-save').textContent = 'Сохранить';
  document.getElementById('contact-name-input').value = c.name;
  document.getElementById('contact-username-input').value = c.username || '';
  document.getElementById('delete-contact-btn').style.display = 'block';

  state.tempContactColor = c.color || CONTACT_COLORS[0];
  renderColorSwatches('contact-color-swatches', state.tempContactColor);

  const prev = document.getElementById('contact-avatar-preview');
  if (c.avatar) {
    prev.innerHTML = `<img src="${c.avatar}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">`;
  } else {
    prev.textContent = (c.name || '?')[0].toUpperCase();
  }

  // Status
  const knownStatuses = ['online','away','offline'];
  const isKnown = knownStatuses.includes(c.status);
  document.querySelectorAll('.status-option').forEach(b => {
    const isCustom = b.dataset.status === 'custom';
    b.classList.toggle('active', isCustom ? !isKnown : b.dataset.status === c.status);
  });
  const customInput = document.getElementById('contact-custom-status');
  if (!isKnown) {
    customInput.style.display = 'block';
    customInput.value = c.status || '';
  } else {
    customInput.style.display = 'none';
  }

  document.getElementById('contact-modal').classList.add('open');
}

function closeContactModal() {
  document.getElementById('contact-modal').classList.remove('open');
}

function selectContactStatus(btn) {
  document.querySelectorAll('.status-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.tempContactStatus = btn.dataset.status;
  const customInput = document.getElementById('contact-custom-status');
  customInput.style.display = btn.dataset.status === 'custom' ? 'block' : 'none';
}

function handleContactAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.tempContactAvatar = ev.target.result;
    const prev = document.getElementById('contact-avatar-preview');
    prev.innerHTML = `<img src="${ev.target.result}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function saveContact() {
  const name = document.getElementById('contact-name-input').value.trim();
  if (!name) { toast('Введи имя контакта'); return; }

  let rawUsername = document.getElementById('contact-username-input').value.trim();
  let username = '';
  if (rawUsername) {
    username = rawUsername.startsWith('@') ? rawUsername : '@' + rawUsername;
  }

  let status = state.tempContactStatus;
  if (status === 'custom') {
    status = document.getElementById('contact-custom-status').value.trim() || 'онлайн';
  }

  if (state.editingContactId) {
    const c = getContact(state.editingContactId);
    c.name = name;
    c.username = username;
    c.status = status;
    c.color = state.tempContactColor;
    if (state.tempContactAvatar !== undefined) c.avatar = state.tempContactAvatar;
    if (state.activeContactId === c.id) updateChatHeader(c, false);
  } else {
    const newContact = {
      id: Date.now(),
      name,
      username,
      status,
      color: state.tempContactColor,
      avatar: state.tempContactAvatar || null,
      messages: [],
    };
    state.contacts.push(newContact);
  }

  saveState();
  renderContacts();
  closeContactModal();
  toast('Контакт сохранён');
}

function confirmDeleteContact(e, id) {
  e.stopPropagation();
  if (!confirm('Удалить контакт и все сообщения?')) return;
  state.contacts = state.contacts.filter(c => c.id != id);
  if (state.activeContactId == id) {
    state.activeContactId = null;
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('chat-view').style.display = 'none';
  }
  saveState();
  renderContacts();
}

function deleteCurrentContact() {
  if (!state.editingContactId) return;
  if (!confirm('Удалить контакт и все сообщения?')) return;
  state.contacts = state.contacts.filter(c => c.id !== state.editingContactId);
  if (state.activeContactId === state.editingContactId) {
    state.activeContactId = null;
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('chat-view').style.display = 'none';
  }
  saveState();
  renderContacts();
  closeContactModal();
  toast('Контакт удалён');
}

function openEditGroupModal() {
  const g = getGroup(state.activeGroupId);
  if (!g) return;
  state.editingGroupId = g.id;
  state.tempGroupAvatar = g.avatar || null;
  state.tempGroupMembers = [...(g.members || [])];

  document.getElementById('group-modal-title').textContent = 'Редактировать группу';
  document.getElementById('group-modal-save').textContent = 'Сохранить';
  document.getElementById('group-name-input').value = g.name;
  document.getElementById('delete-group-btn').style.display = 'block';

  const prev = document.getElementById('group-avatar-preview');
  if (g.avatar) {
    prev.innerHTML = `<img src="${g.avatar}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">`;
  } else {
    prev.textContent = '⊞';
  }

  renderGroupMemberList();
  document.getElementById('group-modal').classList.add('open');
}

function closeGroupModal() {
  document.getElementById('group-modal').classList.remove('open');
}

function renderGroupMemberList() {
  const container = document.getElementById('group-member-list');
  const noContacts = document.getElementById('group-no-contacts');
  container.innerHTML = '';

  if (state.contacts.length === 0) {
    container.style.display = 'none';
    noContacts.style.display = 'block';
    return;
  }
  container.style.display = 'flex';
  noContacts.style.display = 'none';

  state.contacts.forEach(c => {
    const selected = state.tempGroupMembers.includes(String(c.id));
    const item = document.createElement('div');
    item.className = 'member-item' + (selected ? ' selected' : '');
    item.innerHTML = `
      <input type="checkbox" ${selected ? 'checked' : ''}>
      ${makeAvatarEl(c.avatar, c.name, 28, 'contact-avatar')}
      <span>${esc(c.name)}</span>
      ${c.username ? `<span style="font-size:11px;color:var(--text-muted)">${esc(c.username)}</span>` : ''}
    `;
    item.onclick = () => {
      const id = String(c.id);
      const idx = state.tempGroupMembers.indexOf(id);
      if (idx >= 0) state.tempGroupMembers.splice(idx, 1);
      else state.tempGroupMembers.push(id);
      renderGroupMemberList();
    };
    container.appendChild(item);
  });
}

function handleGroupAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    state.tempGroupAvatar = ev.target.result;
    const prev = document.getElementById('group-avatar-preview');
    prev.innerHTML = `<img src="${ev.target.result}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function saveGroup() {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) { toast('Введи название группы'); return; }

  if (state.editingGroupId) {
    const g = getGroup(state.editingGroupId);
    g.name = name;
    g.members = [...state.tempGroupMembers];
    if (state.tempGroupAvatar !== undefined) g.avatar = state.tempGroupAvatar;
    if (state.activeGroupId === g.id) updateChatHeader(g, true);
  } else {
    const newGroup = {
      id: Date.now(),
      name,
      avatar: state.tempGroupAvatar || null,
      members: [...state.tempGroupMembers],
      messages: [],
    };
    if (!state.groups) state.groups = [];
    state.groups.push(newGroup);
  }

  saveState();
  renderContacts();
  closeGroupModal();
  toast('Группа сохранена');
}

function confirmDeleteGroup(e, id) {
  e.stopPropagation();
  if (!confirm('Удалить группу и все сообщения?')) return;
  state.groups = (state.groups || []).filter(g => g.id != id);
  if (state.activeGroupId == id) {
    state.activeGroupId = null;
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('chat-view').style.display = 'none';
  }
  saveState();
  renderContacts();
}

function deleteCurrentGroup() {
  if (!state.editingGroupId) return;
  if (!confirm('Удалить группу и все сообщения?')) return;
  state.groups = (state.groups || []).filter(g => g.id !== state.editingGroupId);
  if (state.activeGroupId === state.editingGroupId) {
    state.activeGroupId = null;
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('chat-view').style.display = 'none';
  }
  saveState();
  renderContacts();
  closeGroupModal();
  toast('Группа удалена');
}

// ══════════════════════════════════
//   CLEAR CHAT
// ══════════════════════════════════
function clearChat() {
  if (!confirm('Очистить все сообщения в этом чате?')) return;
  const chat = state.activeGroupId ? getGroup(state.activeGroupId) : getContact(state.activeContactId);
  if (!chat) return;
  chat.messages = [];
  saveState();
  renderMessages();
  renderContacts();
  toast('Чат очищен');
}

// ══════════════════════════════════
//   SCREENSHOT
// ══════════════════════════════════
function exportScreenshot() {
  toast('Используй встроенный скриншот устройства / браузера');
}

// ══════════════════════════════════
//   UTILS
// ══════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
